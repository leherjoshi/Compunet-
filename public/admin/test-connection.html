<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Google Sheets Connection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .status {
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        pre {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <h1>🔗 Google Sheets Connection Test</h1>
    
    <p>This page tests the connection to your Google Apps Script API.</p>
    
    <button onclick="testConnection()">Test Connection</button>
    
    <div id="status"></div>
    <div id="data"></div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxP5kibRVFXo-HqlDhPvRSrK0Y97QTnvXDOK3YIaWoB7F_lavIkVFv-MMQhqhxc-fbY/exec';

        async function testConnection() {
            const statusDiv = document.getElementById('status');
            const dataDiv = document.getElementById('data');
            
            statusDiv.innerHTML = '<div class="status loading">⏳ Testing connection...</div>';
            dataDiv.innerHTML = '';
            
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                statusDiv.innerHTML = `
                    <div class="status success">
                        ✅ Connection successful!<br>
                        Found ${data.length} student records
                    </div>
                `;
                
                dataDiv.innerHTML = `
                    <h3>Sample Data (first 3 records):</h3>
                    <pre>${JSON.stringify(data.slice(0, 3), null, 2)}</pre>
                `;
                
            } catch (error) {
                statusDiv.innerHTML = `
                    <div class="status error">
                        ❌ Connection failed!<br>
                        Error: ${error.message}
                    </div>
                `;
                
                dataDiv.innerHTML = `
                    <h3>Troubleshooting:</h3>
                    <ul>
                        <li>Make sure your Google Apps Script is deployed as a web app</li>
                        <li>Check that "Anyone" has access to the web app</li>
                        <li>Verify the URL is correct</li>
                        <li>Check browser console for CORS errors</li>
                    </ul>
                `;
            }
        }
        
        // Auto-test on page load
        window.addEventListener('load', testConnection);
    </script>
</body>
</html>
